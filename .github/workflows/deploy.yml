name: Deploy Roll Monitor Expo

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. Baixar o código do GitHub
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Fazer login no Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Criar a imagem e enviar para o Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ticeslogistics/roll_monitor_expo:latest

    # 4. Copiar os arquivos da DAG para o servidor via SCP
    - name: Deploy DAGs via SCP
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}

        # Pegar os arquivos locais das DAGs
        source: "dags/roll_monitor_expo_dag.py"
        target: "/home/ubuntu/projects/data-platform/dags/"
        strip_components: 1
        